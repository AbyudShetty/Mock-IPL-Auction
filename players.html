<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Auction Player Viewer</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --b: #ef4444; /* Batsman */
            --fb: #10b981; /* Fast Bowler */
            --s: #8b5cf6; /* Spinner */
            --ar: #f59e0b; /* All-rounder */
            --wk: #ec4899; /* Wicket Keeper */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .set-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .set-title {
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        .count-badge {
            font-size: 0.8rem;
            background: #334155;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        .player-card:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.1);
        }

        .role-tag {
            font-size: 0.7rem;
            font-weight: 800;
            padding: 3px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* Role Colors */
        .role-b { background: var(--b); color: white; }
        .role-fb { background: var(--fb); color: white; }
        .role-s { background: var(--s); color: white; }
        .role-ar { background: var(--ar); color: white; }
        .role-wk { background: var(--wk); color: white; }
        .role-default { background: #64748b; color: white; }
    </style>
</head>
<body>

    <h1>Auction Player Pool</h1>
    <div class="container" id="viewer"></div>

    <script>
        const defaultPlayers = {
            "Marquee Set": ["Virat Kohli - b", "Suryakumar Yadav - b", "Jos Buttler ✈️ - wk", "Hardik Pandya - ar", "Jasprit Bumrah - fb", "KL Rahul - wk", "Varun Chakravarthy - s", "Yuzvendra Chahal - s", "Mitchell Starc ✈️ - fb", "Ravindra Jadeja - ar", "Axar Patel - ar", "Shreyas Iyer - b"],
            "Wicket Keeper 1": ["Rishabh Pant", "Ishan Kishan", "Sanju Samson", "Dinesh Karthik", "MS Dhoni", "Heinrich Klaasen ✈️", "Nicholas Pooran ✈️", "Jitesh Sharma", "Phil Salt ✈️", "Tristan Stubbs ✈️", "Josh Inglis ✈️"],
            "Batsman 1": ["Rohit Sharma", "Shubman Gill", "Ruturaj Gaikwad", "Abhishek Sharma", "Yashasvi Jaiswal", "Travis Head ✈️", "David Miller ✈️", "Tilak Varma", "Rajat Patidar", "Sai Sudharsan"],
            "Fast Bowler 1": ["Mohammad Siraj", "Mohammed Shami", "Bhuvaneshwar Kumar", "Arshdeep Singh", "Prasidh Krishna", "Josh Hazlewood ✈️", "Jofra Archer ✈️", "Kagiso Rabada ✈️", "Trent Boult ✈️", "Pat Cummins ✈️"],
            "Spinner 1": ["Kuldeep Yadav", "Ravi Bishnoi", "Rashid Khan ✈️", "Noor Ahmad ✈️", "Wanindu Hasaranga ✈️", "Digvesh Rathi", "Adam Zampa ✈️"],
            "All-rounder 1": ["Shivam Dube", "Nitish Reddy", "Harshal Patel", "Venkatesh Iyer", "Ramandeep Singh", "Rahul Tewatia", "Krunal Pandya", "Washington Sundar", "Riyan Parag", "Ravichandran Ashwin", "Sai Kishore", "Nitish Rana"],
            "Wicket Keeper 2": ["Finn Allen ✈️", "Ryan Rickelton ✈️", "KS Bharat", "Prabhsimran Singh", "Dhruv Jurel", "Abishek Porel", "Devon Conway ✈️", "Rahmanullah Gurbaz ✈️", "Quinton de Kock ✈️", "Jonny Bairstow ✈️"],
            "Batsman 2": ["Shimron Hetmyer ✈️", "Shashank Singh","Ashutosh Sharma", "Devdutt Padikkal", "Rinku Singh", "Faf Du Plessis ✈️", "Aiden Markram ✈️", "Glenn Phillips ✈️", "Nehal Wadhera", "Rovman Powell ✈️"],
            "Fast Bowler 2": [ "Lockie Ferguson ✈️", "Anrich Nortje ✈️", "Mark Wood ✈️", "Mateesha Pathirana ✈️", "Lungi Ngidi ✈️", "Harshit Rana", "Sandeep Sharma", "T Natarajan", "Shardul Thakur", "Deepak Chahar"],
            "Spinner 2": ["Adil Rashid ✈️", "Shreyas Gopal", "Harpreet Brar", "Suyash Sharma", "Allah Ghazanfar ✈️", "Mujeeb Ur Rahman ✈️", "Mayank Markande", "Rahul Chahar", "Maheesh Theekshana ✈️"],
            "All-rounder 2": ["Andre Russell ✈️", "Romario Shepherd ✈️", "Marcus Stoinis ✈️", "Sam Curran ✈️", "Marco Jansen ✈️", "Tim David ✈️", "Mitchell Marsh ✈️", "Cam Green ✈️", "Jacob Bethell ✈️", "Will Jacks ✈️", "Sunil Narine ✈️", "Mitchell Santner ✈️"],
            "Batsman 3": ["Mayank Agarwal", "Angkrish Raghuvanshi", "Sarfaraz Khan", "Ajinkya Rahane", "Ayush Mhatre", "Vaibhav Sooryavanshi", "Aniket Verma", "Priyansh Arya", "Naman Dhir", "Dewald Brevis ✈️"],
            "Fast Bowler 3": [ "Ishant Sharma", "Vyshak Vijay Kumar", "Mohit Sharma", "Mayank Yadav", "Akash Madhwal", "Anshul Kamboj", "Avesh Khan", "Akash Deep", "Jaydev Unadkat", "Khaleel Ahmed", "Mukesh Kumar", "Yash Dayal"],
            "All-rounder 3": ["Shabaz Ahmed", "Deepak Hooda", "Vipraj Nigam", "Swapnil Singh", "Ayush Badoni", "Azmatullah Omarzai ✈️", "Sherfane Rutherford ✈️", "Dasun Shanaka ✈️", "Kamindu Mendis ✈️", "Liam Livingstone ✈️", "Rachin Ravindra ✈️", "Glenn Maxwell ✈️"],
            "Batsman 4": ["Jake Fraser McGurk ✈️", "Steve Smith ✈️", "David Warner ✈️", "Kane Williamson ✈️", "Rahul Tripathi", "Karun Nair", "Prithvi Shaw", "Abdul Samad", "Shahrukh Khan", "Manish Pandey"],
            "Fast Bowler 4": ["Dushmantha Chameera ✈️", "Nuwan Thushara ✈️", "Nandre Burger ✈️", "Kyle Jamieson ✈️", "Tushar Deshpande", "Nathan Ellis ✈️", "Umran Malik", "Mohsin Khan", "Rasikh Dar", "Vaibhav Arora"],
        };

        const viewer = document.getElementById('viewer');

        // Helper to guess role based on set name if not explicitly provided
        function getRoleFromSet(setName) {
            if(setName.includes("Batsman")) return "b";
            if(setName.includes("Fast Bowler")) return "fb";
            if(setName.includes("Spinner")) return "s";
            if(setName.includes("All-rounder")) return "ar";
            if(setName.includes("Wicket Keeper")) return "wk";
            return "default";
        }

        for (const [setName, players] of Object.entries(defaultPlayers)) {
            const section = document.createElement('div');
            section.className = 'set-section';
            
            section.innerHTML = `
                <div class="set-title">
                    ${setName}
                    <span class="count-badge">${players.length}</span>
                </div>
                <div class="player-list" id="${setName.replace(/\s+/g, '')}"></div>
            `;
            
            viewer.appendChild(section);
            const listContainer = document.getElementById(setName.replace(/\s+/g, ''));

            players.forEach(playerStr => {
                let name = playerStr;
                let role = getRoleFromSet(setName);

                // Handle the "Name - role" format in Marquee Set
                if (playerStr.includes(" - ")) {
                    const parts = playerStr.split(" - ");
                    name = parts[0];
                    role = parts[1];
                }

                const card = document.createElement('div');
                card.className = 'player-card';
                card.innerHTML = `
                    <span>${name}</span>
                    <span class="role-tag role-${role}">${role}</span>
                `;
                listContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
